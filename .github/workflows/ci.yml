name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - name: Ruff lint
        run: ruff check src tests
      - name: Ruff format check
        run: ruff format --check src tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
        with:
          # setuptools-scm derives the version from git history/tags
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: pip install -e .[dev]
      - name: Run tests with coverage
        run: pytest --cov=rspt2spectra --cov-report=lcov
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          flag-name: python-${{ matrix.python-version }}
          parallel: true
          file: coverage.lcov

  test-mpi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install OpenMPI
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenmpi-dev openmpi-bin
      - name: Install package with MPI support
        run: pip install -e .[dev,mpi]
      - name: Run tests under MPI
        run: mpiexec -n 2 --oversubscribe pytest -q

  coveralls-finish:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Close Coveralls parallel build
        uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
          carryforward: "python-3.11,python-3.12,python-3.13,python-3.14"

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package with docs dependencies
        run: pip install -e .[docs]
      - name: Build documentation
        run: sphinx-build -W -b html docs docs/_build/html
      - name: Upload docs artifact
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy-docs:
    needs: docs
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
